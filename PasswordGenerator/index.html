<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <title>Password Generator</title>
</head>
<body>
<button id="theme-toggle">🌙</button>
<h1>Generate a<br><span class="accent">random password</span></h1>
<p class="subtitle">Never use an insecure password ever again</p>

<div class="input-container">
    <button onclick="generatePassword()" id="generate-el">GENERATE PASSWORDS</button>

    <div class="settings-wrapper">
        <div class="controls-group">
            <div class="label-wrapper">
                <span>Length:</span>
                <span id="length-val">15</span>
            </div>
            <input type="range" id="length-el" min="5" max="25" value="15">
        </div>

        <div class="checkbox-container">
            <label><input type="checkbox" id="uppercase" checked> ABC</label>
            <label><input type="checkbox" id="lowercase" checked> abc</label>
            <label><input type="checkbox" id="numbers" checked> 123</label>
            <label><input type="checkbox" id="symbols" checked> #&%</label>
        </div>
    </div>
</div>

<div class="container-h2">
    <h2>PASSWORD #1</h2>
    <h2>PASSWORD #2</h2>
</div>

<div class="password-container">
    <div class="password-box" id="password-one-el">
        <span class="password-text">...</span>
        <span class="tooltip">Copy Password</span>
    </div>

    <div class="password-box" id="password-two-el">
        <span class="password-text">...</span>
        <span class="tooltip">Copy Password</span>
    </div>
</div>
<div class="strength-wrapper">
    <div class="strength-bar">
        <div id="strength-fill"></div>
    </div>
    <span id="strength-text">Strength: —</span>
</div>
<script src="index.js"></script>
</body>
</html>
